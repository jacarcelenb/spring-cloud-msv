spring:
  application:
    name: reports-ms
  profiles:
    default: default
  config:
    import: "optional:configserver:http://localhost:7777"
server:
  servlet:
    context-path: /reports-ms
  port: 7071
eureka:
  instance:
    instance-id: "${spring.application.name}:${random.value}"
    prefer-ip-address: true
client:
  service-url:
    defaultZone: http://localhost:8761/eureka/